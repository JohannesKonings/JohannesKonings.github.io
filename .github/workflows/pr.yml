name: PR Checks

on:
  pull_request:
    branches:
      - main
      - vite-plus

jobs:
  checks:
    name: Repo checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run repo checks
        run: vp check

  tanstack-tests:
    name: TanStack tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install Playwright browser
        run: vp exec --filter tanstack -- playwright install --with-deps chromium

      - name: Run TanStack tests
        run: vp run --filter tanstack test:all

  tanstack-build:
    name: TanStack build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run TanStack build
        run: vp run build:tanstack

      - name: Upload TanStack build artifact
        uses: actions/upload-artifact@v7
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public
          if-no-files-found: error

  tanstack-seo-geo:
    name: TanStack SEO and GEO
    runs-on: ubuntu-latest
    needs: tanstack-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Download TanStack build artifact
        uses: actions/download-artifact@v8
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public

      - name: Verify TanStack SEO and GEO
        run: vp run verify:tanstack:seo-geo

  tanstack-lighthouse:
    name: TanStack Lighthouse
    runs-on: ubuntu-latest
    needs: tanstack-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install Playwright browser
        run: vp exec --filter tanstack -- playwright install --with-deps chromium

      - name: Download TanStack build artifact
        uses: actions/download-artifact@v8
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public

      - name: Run TanStack Lighthouse checks
        run: vp run verify:tanstack:lighthouse
