name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run format check
        run: pnpm run format:check

  lint-check:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run lint check
        run: pnpm run lint:check

  typescript-check:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm run tsc:check

  tanstack-tests:
    name: TanStack tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter tanstack exec playwright install --with-deps chromium

      - name: Run TanStack tests
        run: pnpm --filter tanstack test:all

  tanstack-build:
    name: TanStack build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run TanStack build
        run: pnpm run build:tanstack

      - name: Upload TanStack build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public
          if-no-files-found: error

  tanstack-seo-geo:
    name: TanStack SEO and GEO
    runs-on: ubuntu-latest
    needs: tanstack-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Download TanStack build artifact
        uses: actions/download-artifact@v4
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public

      - name: Verify TanStack SEO and GEO
        run: pnpm run verify:tanstack:seo-geo

  tanstack-lighthouse:
    name: TanStack Lighthouse
    runs-on: ubuntu-latest
    needs: tanstack-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          check-latest: true

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter tanstack exec playwright install --with-deps chromium

      - name: Download TanStack build artifact
        uses: actions/download-artifact@v4
        with:
          name: tanstack-public-build
          path: websites/tanstack/.output/public

      - name: Run TanStack Lighthouse checks
        run: pnpm run verify:tanstack:lighthouse
