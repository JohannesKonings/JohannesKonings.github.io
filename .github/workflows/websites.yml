name: Deploy websites to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # default value when not using subfolders
  WEBSITE_TANSTACK_PATH: websites/tanstack

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: false
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: vp install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build with Tanstack
        run: NODE_ENV=production NITRO_PRESET=static vp run build:tanstack
        working-directory: ${{ env.BUILD_PATH }}
      - name: Prepare deployment artifact
        run: |
          set -e
          mkdir -p ${{ env.BUILD_PATH }}/dist
          cp -r ${{ env.WEBSITE_TANSTACK_PATH }}/.output/public/. ${{ env.BUILD_PATH }}/dist/

          # Preserve GitHub Pages custom domain configuration
          if [ -f "${{ env.BUILD_PATH }}/CNAME" ]; then
            cp "${{ env.BUILD_PATH }}/CNAME" "${{ env.BUILD_PATH }}/dist/CNAME"
          fi

          # Create .nojekyll to prevent GitHub Pages from processing as Jekyll
          touch ${{ env.BUILD_PATH }}/dist/.nojekyll

          # Fail fast if TanStack root HTML is missing from the artifact
          if [ ! -f "${{ env.BUILD_PATH }}/dist/index.html" ]; then
            echo "::error::Expected dist/index.html was not generated by TanStack build."
            echo "Top-level files in dist:"
            ls -la "${{ env.BUILD_PATH }}/dist"
            exit 1
          fi

          # Basic sanity checks for key static routes (allow flat or subfolder output)
          for route in blog notes search; do
            if [ ! -f "${{ env.BUILD_PATH }}/dist/${route}.html" ] && [ ! -f "${{ env.BUILD_PATH }}/dist/${route}/index.html" ]; then
              echo "::error::Missing prerendered route output for /${route}."
              exit 1
            fi
          done

          # SPA routing: copy index.html to 404.html at root for direct/refresh URLs
          if [ -f "${{ env.BUILD_PATH }}/dist/index.html" ]; then
            cp "${{ env.BUILD_PATH }}/dist/index.html" "${{ env.BUILD_PATH }}/dist/404.html"
          fi

          # Redirect old /tanstack/* URLs to /* for SEO and existing references
          (cd ${{ env.BUILD_PATH }} && node scripts/inject-404-redirect.mjs)

          # Debug: List build structure
          echo "=== Build structure ==="
          find ${{ env.BUILD_PATH }}/dist -type f -name "*.html" | head -10 || echo "No HTML files found"
          find ${{ env.BUILD_PATH }}/dist -type f -name "index.*" | head -10 || echo "No index files found"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy websites to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
