<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Projen with own batteries cover image</title>
  <desc id="desc">Decorative cover with the title Projen with own batteries and a subtitle about central project defaults.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <g opacity="0.18" fill="none" stroke="#e2e8f0" stroke-width="2">
    <rect x="160" y="140" width="1280" height="620" rx="32"/>
    <rect x="210" y="200" width="240" height="64" rx="16"/>
    <rect x="210" y="300" width="1180" height="24" rx="12"/>
    <rect x="210" y="350" width="960" height="24" rx="12"/>
    <rect x="210" y="440" width="540" height="180" rx="24"/>
    <rect x="800" y="440" width="590" height="180" rx="24"/>
  </g>
  <g fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="210" y="270" font-size="34" font-weight="600" letter-spacing="4">PROJEN</text>
    <text x="210" y="430" font-size="84" font-weight="800">Projen with own batteries</text>
    <text x="210" y="515" font-size="34" font-weight="500" opacity="0.92">Store central project decisions once and reuse them across repositories.</text>
  </g>
</svg>
